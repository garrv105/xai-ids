[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short --strict-markers -q"
markers = [
    "slow: marks tests as slow",
    "gpu: marks tests requiring GPU",
]

[tool.coverage.run]
source = ["xai_ids"]
omit = ["tests/*", "scripts/*"]

[tool.coverage.report]
show_missing = true
fail_under = 70
