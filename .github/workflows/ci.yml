name: XAI-IDS CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

env:
  PYTHON_VERSION_DEFAULT: "3.11"

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Lint & Format
  # ─────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}
          cache: pip

      - name: Install linting tools
        run: pip install ruff black isort

      - name: Run ruff
        run: ruff check xai_ids/ tests/ scripts/

      - name: Run black (check mode)
        run: black --check xai_ids/ tests/ scripts/

      - name: Run isort (check mode)
        run: isort --check-only xai_ids/ tests/ scripts/

  # ─────────────────────────────────────────────
  # JOB 2: Test Matrix (CPU only, no GPU needed)
  # ─────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install CPU-only PyTorch first
        # Install torch before other deps to avoid CUDA pulls in CI
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Install project dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests with coverage
        env:
          # Force CPU usage in tests
          CUDA_VISIBLE_DEVICES: ""
          XAI_IDS_ENV: "test"
        run: |
          pytest tests/ \
            --cov=xai_ids \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short \
            -v

      - name: Upload coverage to Codecov
        if: matrix.python-version == env.PYTHON_VERSION_DEFAULT
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: xai-ids
          fail_ci_if_error: false

  # ─────────────────────────────────────────────
  # JOB 3: Security Scan
  # ─────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}
          cache: pip

      - name: Install security tools
        run: pip install bandit pip-audit safety

      - name: Run bandit (static analysis)
        run: |
          bandit -r xai_ids/ \
            -x xai_ids/tests \
            -ll \
            -f json \
            -o bandit-report.json || true
          bandit -r xai_ids/ -x xai_ids/tests -ll

      - name: Run pip-audit
        run: |
          pip install -e "." --dry-run 2>/dev/null || true
          pip-audit --ignore-vuln GHSA-wj6h-64fc-37mp || true

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  # ─────────────────────────────────────────────
  # JOB 4: Model Training Smoke Test
  # ─────────────────────────────────────────────
  training-smoke:
    name: Training Smoke Test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}
          cache: pip

      - name: Install CPU-only PyTorch
        run: pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Install project
        run: pip install -e "."

      - name: Run training smoke test (2 epochs, small dataset)
        env:
          CUDA_VISIBLE_DEVICES: ""
        run: |
          python scripts/train.py \
            --epochs 2 \
            --samples-per-class 50 \
            --batch-size 16 \
            --output-dir /tmp/smoke-model \
            --no-adversarial

      - name: Verify model artifact exists
        run: |
          test -f /tmp/smoke-model/ids_model.pt && echo "Model saved successfully"
          test -f /tmp/smoke-model/training_metrics.json && echo "Metrics saved successfully"

  # ─────────────────────────────────────────────
  # JOB 5: Docker Build
  # ─────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: xai-ids:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            INSTALL_EXTRAS=cpu

  # ─────────────────────────────────────────────
  # JOB 6: Release (main branch only)
  # ─────────────────────────────────────────────
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    needs: [test, security, docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION_DEFAULT }}

      - name: Install CPU-only PyTorch
        run: pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Install build tools
        run: pip install build twine

      - name: Build wheel
        run: python -m build --wheel

      - name: Verify wheel
        run: twine check dist/*.whl

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: xai-ids-wheel-${{ github.sha }}
          path: dist/*.whl
          retention-days: 30
